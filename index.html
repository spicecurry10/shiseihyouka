<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>姿勢評価</title>
  <link rel="stylesheet" href="style.css?v=20260527-privacy">
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.22.0/dist/tf-backend-webgl.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js" defer></script>
  <script src="app.js?v=20260527-privacy" defer></script>
</head>
<body>
  <noscript>JavaScriptを有効にしてください。姿勢評価はブラウザ内のJavaScriptで動作します。</noscript>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <h1>姿勢評価</h1>
        <p>Before / After写真を骨格推定または手動タップで比較します。</p>
      </div>
      <div id="modelStatus" class="status-pill">モデル準備中</div>
    </header>

    <section id="messageArea" class="message-area" aria-live="polite"></section>

    <section class="panel privacy-panel">
      <div class="history-header">
        <h2>プライバシー</h2>
        <button id="clearAllDataBtn" type="button" class="danger compact">端末内データ全削除</button>
      </div>
      <ul class="privacy-list">
        <li>写真はこの端末のブラウザ内で処理し、アプリ側で保存や送信はしません。</li>
        <li>保存されるのは日時、評価項目、数値結果、入力方法のみです。</li>
        <li>氏名、生年月日、住所、電話番号など本人を特定できる情報は入力しないでください。</li>
        <li>共用端末では、使用後に「端末内データ全削除」を押してください。</li>
      </ul>
      <label class="confirm-row">
        <input id="privacyConfirm" type="checkbox">
        <span>上記を確認し、本人の同意を得たうえで使用します。</span>
      </label>
    </section>

    <section class="panel">
      <div class="form-grid">
        <label>
          評価項目
          <select id="themeSelect">
            <option value="neck">首疲労：頭部前方偏位</option>
            <option value="shoulder">肩疲労：肩の高さ左右差</option>
            <option value="lowerBack">腰疲労：体幹の傾き</option>
            <option value="knee">膝疲労：膝角度</option>
          </select>
        </label>
        <label>
          入力モード
          <select id="modeSelect">
            <option value="auto">自動推定を試す</option>
            <option value="manual">手動タップのみ</option>
          </select>
        </label>
      </div>
      <div id="guide" class="guide"></div>
    </section>

    <section class="compare-grid">
      <article class="photo-panel">
        <div class="panel-title">
          <h2>Before</h2>
          <span id="beforeStatus">写真未選択</span>
        </div>
        <div class="button-row">
          <label class="file-button">
            撮影
            <input id="beforeCamera" type="file" accept="image/*" capture="environment">
          </label>
          <label class="file-button secondary">
            写真を選ぶ
            <input id="beforeFile" type="file" accept="image/*">
          </label>
        </div>
        <canvas id="beforeCanvas" width="900" height="680"></canvas>
        <div class="button-row">
          <button type="button" class="secondary" data-action="undo" data-side="before">1点戻す</button>
          <button type="button" class="danger" data-action="clear" data-side="before">点を削除</button>
        </div>
      </article>

      <article class="photo-panel">
        <div class="panel-title">
          <h2>After</h2>
          <span id="afterStatus">写真未選択</span>
        </div>
        <div class="button-row">
          <label class="file-button">
            撮影
            <input id="afterCamera" type="file" accept="image/*" capture="environment">
          </label>
          <label class="file-button secondary">
            写真を選ぶ
            <input id="afterFile" type="file" accept="image/*">
          </label>
        </div>
        <canvas id="afterCanvas" width="900" height="680"></canvas>
        <div class="button-row">
          <button type="button" class="secondary" data-action="undo" data-side="after">1点戻す</button>
          <button type="button" class="danger" data-action="clear" data-side="after">点を削除</button>
        </div>
      </article>
    </section>

    <section class="panel">
      <div class="button-row">
        <button id="runAutoBtn" type="button">骨格推定する</button>
        <button id="compareBtn" type="button" class="secondary">比較する</button>
        <button id="saveBtn" type="button" class="secondary">結果を保存</button>
        <button id="csvBtn" type="button" class="secondary">CSV出力</button>
      </div>
      <div id="resultBox" class="result-box">まだ比較していません。</div>
    </section>

    <section class="panel">
      <div class="history-header">
        <h2>保存記録</h2>
        <button id="clearRecordsBtn" type="button" class="danger compact">全削除</button>
      </div>
      <div id="historyBox" class="history-box">保存記録はありません。</div>
    </section>
  </main>
</body>
</html>
